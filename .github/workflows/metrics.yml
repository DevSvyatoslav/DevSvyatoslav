name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"       # запуск раз в сутки (UTC)
  workflow_dispatch:          # запуск вручную
  push:
    branches: [main, master]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # чтобы коммитить .svg в репозиторий

    steps:
      # 1) Карточка: языки + технологии (topics)
      - name: Main card (languages + topics)
        uses: lowlighter/metrics@latest
        with:
          user: DevSvyatoslav
          token: ${{ secrets.GITHUB_TOKEN }}  # встроенный токен, PAT не нужен
          filename: github-metrics.svg
          template: classic
          base: header, repositories, metadata

          # Языки
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_other: yes
          # plugin_languages_ignored: html, css   # опционально скрыть лишнее

          # Технологии (звёздные topics)
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 12

      # 2) Отдельная карточка MBTI (16Personalities)
      - name: MBTI (16Personalities)
        uses: lowlighter/metrics@latest
        with:
          user: DevSvyatoslav
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ""
          filename: metrics.plugin.16personalities.svg

          plugin_16personalities: yes
          plugin_16personalities_url: ${{ secrets.SIXTEEN_PERSONALITIES_URL }}
          plugin_16personalities_sections: personality, traits
          plugin_16personalities_scores: yes
