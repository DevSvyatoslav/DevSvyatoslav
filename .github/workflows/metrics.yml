name: Metrics (stack only)

on:
  schedule:
    - cron: "0 0 * * *"      # раз в сутки (UTC)
  workflow_dispatch:          # ручной запуск
  push:
    branches: [main, master]

jobs:
  stack:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # чтобы записать svg в репозиторий

    steps:
      - name: Stack (languages + topics, no header)
        uses: lowlighter/metrics@latest
        with:
          user: DevSvyatoslav
          token: ${{ secrets.GITHUB_TOKEN }}

          # ВАЖНО: пустой base = не будет "хедера" с коммитами/контрибами
          base: ""
          template: classic
          filename: stack.svg

          # Языки (только проценты, без коммит-статистики)
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_other: yes
          # Опционально "недавние" вместо "за всё время":
          # plugin_languages_sections: recently-used
          # plugin_languages_recent_days: 14
          # plugin_languages_recent_load: 400

          # Технологии (по Star на topics)
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 12
