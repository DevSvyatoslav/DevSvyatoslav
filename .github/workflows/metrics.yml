name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]   # раз в сутки
  workflow_dispatch:                 # руками из Actions
  push: {branches: ["main", "master"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1) Основная карточка: языки + технологии (topics)
      - name: Main card (languages + topics)
        uses: lowlighter/metrics@latest
        with:
          user: DevSvyatoslav
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          template: classic
          base: header, repositories, metadata

          # Языки
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 8       # максимум 8; остальные можно в "Other"
          plugin_languages_other: yes
          # plugin_languages_ignored: html, css   # опционально скрыть лишнее

          # Технологии (звёздные темы с иконками)
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 12

      # 2) Отдельная картинка MBTI (16Personalities)
      - name: MBTI (16Personalities)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}  # сам плагин токен не требует, но экшену он нужен
          base: ""
          filename: metrics.plugin.16personalities.svg
          plugin_16personalities: yes
          plugin_16personalities_url: ${{ secrets.SIXTEEN_PERSONALITIES_URL }}
          plugin_16personalities_sections: personality, traits
          plugin_16personalities_scores: yes
